<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no">
    <title>JSMod</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0b1020;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <script type="module">
        import { JSMod } from "./jsmod.js";

        const jsmod = new JSMod({
            // Configuration options can be added here
        });

        jsmod.addAsset("anim_test", "webp", "./assets/textures/anim_test.webp");
        await jsmod.init();
    </script>
</body>
</html>
